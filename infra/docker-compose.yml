@@
   worker:
     build: ../services/orchestrator
     container_name: orchestrator_worker
     restart: unless-stopped
     command: ["python", "rq_worker.py"]
     environment:
       - REDIS_URL=redis://redis:6379/0
       - DATABASE_URL=postgresql+asyncpg://ma_user:ma_pass@postgres:5432/master_agent
       - DOCKER_SOCK=/var/run/docker.sock
     volumes:
       - /var/run/docker.sock:/var/run/docker.sock
     depends_on:
       - redis
       - postgres
       - orchestrator
     networks:
       - map
+
+  rq_exporter:
+    image: python:3.11-slim
+    container_name: rq_exporter
+    command: ["python", "/app/rq_exporter.py"]
+    volumes:
+      - ../services/orchestrator/rq_exporter.py:/app/rq_exporter.py:ro
+    environment:
+      - REDIS_URL=redis://redis:6379/0
+      - RQ_EXPORTER_PORT=9121
+    ports:
+      - "9121:9121"
+    depends_on:
+      - redis
+    networks:
+      - map
+
+  rq_dashboard:
+    build: ../services/rq_dashboard
+    container_name: rq_dashboard
+    restart: unless-stopped
+    ports:
+      - "9181:9181"
+    environment:
+      - RQ_REDIS_URL=redis://redis:6379
+    depends_on:
+      - redis
+    networks:
+      - map
